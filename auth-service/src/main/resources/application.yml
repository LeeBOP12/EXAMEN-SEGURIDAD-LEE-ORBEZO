server:
  port: 8090

spring:
  application:
    name: auth-service
  config:
    import: "optional:configserver:http://localhost:8088"
  profiles:
    active: default

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ✅ AGREGAR ESTO PARA VER LOGS DE FEIGN
logging:
  level:
    com.transporte.auth.client: DEBUG
    feign: DEBUG
    feign.Logger: DEBUG

# ✅ AGREGAR CONFIGURACIÓN DE FEIGN
feign:
  client:
    config:
      default:
        loggerLevel: full