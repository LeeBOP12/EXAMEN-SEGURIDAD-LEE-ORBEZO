server:
  port: 8060

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: usuario-service
          uri: lb://usuario-service
          predicates:
            - Path=/api/usuarios/**

        - id: ms-destino
          uri: lb://ms-destino
          predicates:
            - Path=/api/destinos/**

        - id: ms-bus
          uri: lb://ms-bus
          predicates:
            - Path=/api/buses/**

        - id: ms-cliente
          uri: lb://ms-cliente
          predicates:
            - Path=/api/clientes/**

        - id: ms-asiento
          uri: lb://ms-asiento
          predicates:
            - Path=/api/asientos/**

        - id: ms-programacion
          uri: lb://ms-programacion
          predicates:
            - Path=/api/programaciones/**

        - id: ms-reserva
          uri: lb://ms-reserva
          predicates:
            - Path=/api/reservas/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    ms_lib.api_gateway.filter: DEBUG