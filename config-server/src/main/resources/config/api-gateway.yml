spring:
  cloud:
    gateway:
      routes:
        # 🔓 RUTAS PÚBLICAS (No requieren JWT)
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: usuario-service
          uri: lb://usuario-service
          predicates:
            - Path=/api/usuarios/**

        # 🔒 RUTAS PROTEGIDAS (Requieren JWT)
        - id: ms-cliente
          uri: lb://ms-cliente
          predicates:
            - Path=/api/clientes/**

        - id: ms-bus
          uri: lb://ms-bus
          predicates:
            - Path=/api/buses/**

        - id: ms-destino
          uri: lb://ms-destino
          predicates:
            - Path=/api/destinos/**

        - id: ms-asiento
          uri: lb://ms-asiento
          predicates:
            - Path=/api/asientos/**

        - id: ms-programacion
          uri: lb://ms-programacion
          predicates:
            - Path=/api/programaciones/**

        - id: ms-reserva
          uri: lb://ms-reserva
          predicates:
            - Path=/api/reservas/**

# Configuración JWT para el Gateway
jwt:
  secret: miClaveSecretaSuperSeguraParaJWT1234567890

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.transporte.gateway: DEBUG